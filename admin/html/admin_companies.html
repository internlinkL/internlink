<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Companies — internLink Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2236;--accent:#4f8ef7;--accent2:#a78bfa;--accent3:#34d399;--text:#f0f4ff;--muted:#8899bb;--border:rgba(79,142,247,0.18);--danger:#f87171;--warn:#fbbf24;--gold:#f59e0b;--nav-h:68px;--sidebar-w:240px}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.08;animation:drift 12s ease-in-out infinite alternate}
    .blob-1{width:600px;height:600px;background:#f59e0b;top:-200px;left:-100px}
    .blob-2{width:500px;height:500px;background:#ef4444;bottom:-150px;right:-100px;animation-delay:4s}
    @keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.05)}}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(10,15,30,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(245,158,11,.15)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.03em;text-decoration:none;color:var(--text)}.logo span{color:var(--gold)}
    .nav-right{display:flex;align-items:center;gap:14px}
    .admin-badge{background:linear-gradient(135deg,var(--gold),#ef4444);color:#fff;font-size:.7rem;font-weight:800;padding:3px 10px;border-radius:100px;text-transform:uppercase}
    .nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#ef4444);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:#fff}
    .theme-toggle{width:44px;height:24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;position:relative;padding:0}
    .theme-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--gold);transition:transform .3s;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1}
    body.light .theme-knob{transform:translateX(20px)}
    .sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--sidebar-w);background:rgba(10,15,30,.9);backdrop-filter:blur(20px);border-right:1px solid rgba(245,158,11,.12);padding:20px 12px;overflow-y:auto;z-index:100}
    .sidebar-section{margin-bottom:28px}.sidebar-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 10px;margin-bottom:6px}
    .nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:.875rem;font-weight:500;transition:all .18s}
    .nav-link:hover{background:var(--surface2);color:var(--text)}.nav-link.active{background:rgba(245,158,11,.15);color:var(--gold);font-weight:600}
    .nav-link .icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
    .nav-badge-red{margin-left:auto;background:#ef4444;color:#fff;font-size:.65rem;font-weight:700;border-radius:100px;padding:2px 7px}
    .main{margin-top:var(--nav-h);margin-left:var(--sidebar-w);padding:32px 36px;position:relative;z-index:1}
    .page-hdr{margin-bottom:24px}.page-hdr h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}.page-hdr p{color:var(--muted);font-size:.9rem}
    .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:9px 14px;flex:1;min-width:200px}
    .search-box:focus-within{border-color:var(--gold)}
    .search-box input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.875rem;color:var(--text);flex:1}
    .search-box input::placeholder{color:var(--muted)}
    .filter-pills{display:flex;gap:6px}
    .fpill{padding:7px 16px;border-radius:100px;font-size:.82rem;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
    .fpill.active{background:var(--gold);border-color:var(--gold);color:#000}
    .fpill:hover:not(.active){border-color:rgba(245,158,11,.4);color:var(--text)}
    /* Company cards */
    .company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .company-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;transition:box-shadow .2s}
    .company-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.2)}
    .company-card.verified{border-color:rgba(52,211,153,.25)}
    .comp-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .comp-logo{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(239,68,68,.15));border:1px solid rgba(245,158,11,.2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;flex-shrink:0}
    .comp-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:2px}
    .comp-email{font-size:.75rem;color:var(--muted)}
    .comp-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;font-size:.78rem;color:var(--muted)}
    .comp-meta span{display:flex;align-items:center;gap:3px}
    .comp-stats{display:flex;gap:12px;margin-bottom:16px}
    .comp-stat{text-align:center;background:var(--surface2);border-radius:8px;padding:8px 14px;flex:1}
    .comp-stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
    .comp-stat-lbl{font-size:.68rem;color:var(--muted)}
    .comp-actions{display:flex;gap:8px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;flex:1;justify-content:center}
    .btn-approve{background:rgba(52,211,153,.15);color:var(--accent3);border:1px solid rgba(52,211,153,.3)}
    .btn-approve:hover{background:rgba(52,211,153,.28)}
    .btn-reject{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.25)}
    .btn-reject:hover{background:rgba(248,113,113,.22)}
    .verified-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;background:rgba(52,211,153,.15);color:var(--accent3);font-size:.72rem;font-weight:700}
    .pending-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;background:rgba(251,191,36,.15);color:var(--warn);font-size:.72rem;font-weight:700}
    .pagination{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:20px}
    .page-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .page-btn:hover{border-color:var(--gold);color:var(--gold)}.page-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}.page-btn:disabled{opacity:.35;cursor:not-allowed}
    .empty-state{text-align:center;padding:48px;color:var(--muted);grid-column:1/-1}
    .empty-state .ei{font-size:2.5rem;opacity:.3;margin-bottom:12px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel{background:linear-gradient(90deg,var(--surface2) 25%,rgba(245,158,11,.05) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:12px}
    body.light{--bg:#f8f4ff;--surface:#ffffff;--surface2:#f0ece8;--text:#1a0a00;--muted:#78716c;--border:rgba(245,158,11,0.2)}
    body.light nav{background:rgba(248,244,255,.92) !important}
    body.light .sidebar{background:rgba(248,244,255,.95)}
    @media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:20px 16px}}
  </style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<nav>
  <a class="logo" href="admin_dashboard.html">intern<span>Link</span></a>
  <div class="nav-right">
    <span class="admin-badge">Admin</span>
    <button class="theme-toggle" onclick="toggleTheme()"><div class="theme-knob" id="themeKnob">🌙</div></button>
    <div class="nav-avatar">A</div>
  </div>
</nav>
<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Admin Panel</div>
    <a class="nav-link" href="admin_dashboard.html"><span class="icon">📊</span>Dashboard</a>
    <a class="nav-link" href="admin_users.html"><span class="icon">👥</span>Users</a>
    <a class="nav-link" href="admin_internships.html"><span class="icon">💼</span>Internships</a>
    <a class="nav-link" href="admin_applications.html"><span class="icon">📋</span>Applications</a>
    <a class="nav-link active" href="admin_companies.html"><span class="icon">🏢</span>Verify Companies <span class="nav-badge-red" id="pendingBadge">0</span></a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Account</div>
    <a class="nav-link" href='../php/logout.php'><span class="icon">🚪</span>Log Out</a>
  </div>
</aside>
<main class="main">
  <div class="page-hdr">
    <h1>Verify Companies</h1>
    <p>Approve or reject company accounts before they can post internships</p>
  </div>
  <div class="toolbar">
    <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="Search by company name or email…" oninput="debounceSearch()"/></div>
    <div class="filter-pills">
      <button class="fpill active" onclick="setFilter('pending',this)"> Pending</button>
      <button class="fpill" onclick="setFilter('verified',this)"> Verified</button>
      <button class="fpill" onclick="setFilter('all',this)">All</button>
    </div>
  </div>
  <div class="company-grid" id="companyGrid">
    <div class="skel" style="height:220px"></div>
    <div class="skel" style="height:220px"></div>
    <div class="skel" style="height:220px"></div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<script>
  let currentFilter = 'pending', currentPage = 1, searchTimer = null;
  document.addEventListener('DOMContentLoaded', () => { applyTheme(); load(); });

  function load() {
    const q = document.getElementById('searchInput').value.trim();
    fetch(`../php/get_companies.php?filter=${currentFilter}&q=${encodeURIComponent(q)}&page=${currentPage}`)
      .then(r => r.json())
      .then(d => {
        if (!d.success) { window.location.href = '/internlink/html/login.html'; return; }
        document.getElementById('pendingBadge').textContent = '';
        renderCards(d.companies);
        renderPagination(d.page, d.pages);
      });
  }

  function renderCards(companies) {
    const grid = document.getElementById('companyGrid');
    if (!companies.length) {
      grid.innerHTML = '<div class="empty-state"><div class="ei">🏢</div>No companies found.</div>';
      return;
    }
    grid.innerHTML = companies.map(c => {
      const name     = c.company_name || `${c.first_name} ${c.last_name}`;
      const verified = c.is_verified == 1;
      return `<div class="company-card ${verified?'verified':''}">
        <div class="comp-header">
          <div class="comp-logo">${esc(name[0]||'?')}</div>
          <div>
            <div class="comp-name">${esc(name)}</div>
            <div class="comp-email">${esc(c.email)}</div>
          </div>
          <div style="margin-left:auto">${verified ? '<span class="verified-tag">✅ Verified</span>' : '<span class="pending-tag">⏳ Pending</span>'}</div>
        </div>
        <div class="comp-meta">
          ${c.sector    ? `<span>⚙️ ${esc(c.sector)}</span>` : ''}
          ${c.country   ? `<span>🌍 ${esc(c.country)}</span>` : ''}
          ${c.wilaya    ? `<span>📍 ${esc(c.wilaya)}</span>` : ''}
          ${c.website   ? `<span>🔗 <a href="${esc(c.website)}" target="_blank" style="color:var(--accent)">${esc(c.website)}</a></span>` : ''}
          <span>📅 Joined ${new Date(c.created_at).toLocaleDateString()}</span>
        </div>
        <div class="comp-stats">
          <div class="comp-stat"><div class="comp-stat-val">${c.internship_count||0}</div><div class="comp-stat-lbl">Internships</div></div>
          <div class="comp-stat"><div class="comp-stat-val">${c.app_count||0}</div><div class="comp-stat-lbl">Applications</div></div>
        </div>
        ${c.description ? `<p style="font-size:.78rem;color:var(--muted);margin-bottom:14px;line-height:1.5">${esc(c.description).substring(0,120)}${c.description.length>120?'…':''}</p>` : ''}
        <div class="comp-actions">
          ${!verified ? `<button class="btn btn-approve" onclick="verify(${c.id},'approve')">✅ Approve</button>` : ''}
          ${verified  ? `<button class="btn btn-reject" onclick="verify(${c.id},'reject')">Revoke</button>` : `<button class="btn btn-reject" onclick="verify(${c.id},'reject')">✗ Reject</button>`}
        </div>
      </div>`;
    }).join('');
  }

  function verify(userId, action) {
    const label = action === 'approve' ? 'Approving…' : 'Processing…';
    fetch('../php/verify_company.php', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action, user_id: userId})
    })
    .then(r => r.json())
    .then(d => { if(d.success) load(); else alert(d.message); });
  }

  function renderPagination(page, pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let h = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= pages; i++)
      h += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    h += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
    el.innerHTML = h;
  }
  function goPage(n) { currentPage = n; load(); window.scrollTo({top:0,behavior:'smooth'}); }
  function setFilter(f, btn) { currentFilter = f; currentPage = 1; document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); load(); }
  function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentPage=1; load(); }, 350); }
  function applyTheme(){if(localStorage.getItem('il-theme')==='light'){document.body.classList.add('light');document.getElementById('themeKnob').textContent='☀️';}}
  function toggleTheme(){const l=document.body.classList.toggle('light');document.getElementById('themeKnob').textContent=l?'☀️':'🌙';localStorage.setItem('il-theme',l?'light':'dark');}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
