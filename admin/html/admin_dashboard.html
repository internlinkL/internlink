<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — internLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2236;--accent:#4f8ef7;--accent2:#a78bfa;--accent3:#34d399;--text:#f0f4ff;--muted:#8899bb;--border:rgba(79,142,247,0.18);--danger:#f87171;--warn:#fbbf24;--gold:#f59e0b;--nav-h:68px;--sidebar-w:240px}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.08;animation:drift 12s ease-in-out infinite alternate}
    .blob-1{width:600px;height:600px;background:#f59e0b;top:-200px;left:-100px}
    .blob-2{width:500px;height:500px;background:#ef4444;bottom:-150px;right:-100px;animation-delay:4s}
    .blob-3{width:350px;height:350px;background:#4f8ef7;top:40%;left:50%;transform:translate(-50%,-50%);animation-delay:8s}
    @keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.05)}}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(10,15,30,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(245,158,11,.15)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.03em;text-decoration:none;color:var(--text)}
    .logo span{color:var(--gold)}
    .nav-right{display:flex;align-items:center;gap:14px}
    .admin-badge{background:linear-gradient(135deg,var(--gold),#ef4444);color:#fff;font-size:.7rem;font-weight:800;padding:3px 10px;border-radius:100px;letter-spacing:.05em;text-transform:uppercase}
    .nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#ef4444);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:#fff;flex-shrink:0}
    .theme-toggle{width:44px;height:24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;position:relative;transition:all .3s;padding:0}
    .theme-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--gold);transition:transform .3s;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1}
    body.light .theme-knob{transform:translateX(20px)}
    .sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--sidebar-w);background:rgba(10,15,30,.9);backdrop-filter:blur(20px);border-right:1px solid rgba(245,158,11,.12);padding:20px 12px;overflow-y:auto;z-index:100}
    .sidebar-section{margin-bottom:28px}
    .sidebar-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 10px;margin-bottom:6px}
    .nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:.875rem;font-weight:500;transition:all .18s}
    .nav-link:hover{background:var(--surface2);color:var(--text)}
    .nav-link.active{background:rgba(245,158,11,.15);color:var(--gold);font-weight:600}
    .nav-link .icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
    .nav-badge-red{margin-left:auto;background:#ef4444;color:#fff;font-size:.65rem;font-weight:700;border-radius:100px;padding:2px 7px}
    .main{margin-top:var(--nav-h);margin-left:var(--sidebar-w);padding:32px 36px;position:relative;z-index:1}
    /* Banner */
    .banner{background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(239,68,68,.12));border:1px solid rgba(245,158,11,.2);border-radius:16px;padding:26px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px;position:relative;overflow:hidden}
    .banner-text h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:3px}
    .banner-text p{color:var(--muted);font-size:.9rem}
    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;transition:transform .2s}
    .stat-card:hover{transform:translateY(-2px)}
    .stat-icon{font-size:1.3rem;margin-bottom:6px}
    .stat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;background:linear-gradient(120deg,var(--gold),#ef4444);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .stat-lbl{font-size:.7rem;color:var(--muted);margin-top:2px}
    /* Cards / Tables */
    .dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px}
    .card:last-child{margin-bottom:0}
    .card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .card-hdr h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;display:flex;align-items:center;gap:7px}
    .card-hdr a{font-size:.78rem;color:var(--gold);text-decoration:none;font-weight:600}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    th{color:var(--muted);font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
    td{padding:10px 10px;border-bottom:1px solid rgba(79,142,247,.07);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(79,142,247,.04)}
    .role-badge{display:inline-flex;padding:2px 9px;border-radius:100px;font-size:.7rem;font-weight:700}
    .role-student{background:rgba(79,142,247,.15);color:var(--accent)}
    .role-company{background:rgba(245,158,11,.15);color:var(--gold)}
    .role-admin{background:rgba(239,68,68,.15);color:var(--danger)}
    .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:.7rem;font-weight:700}
    .sb-pending{background:rgba(251,191,36,.15);color:var(--warn)}
    .sb-accepted{background:rgba(52,211,153,.15);color:var(--accent3)}
    .sb-rejected{background:rgba(248,113,113,.15);color:var(--danger)}
    .sb-viewed{background:rgba(79,142,247,.15);color:var(--accent)}
    /* Skeletons */
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel{background:linear-gradient(90deg,var(--surface2) 25%,rgba(245,158,11,.05) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .anim{animation:fadeUp .4s ease both}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;white-space:nowrap}
    .btn-gold{background:var(--gold);color:#000}
    .btn-gold:hover{background:#d97706;transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--border)}
    .btn-ghost:hover{background:var(--surface2);border-color:var(--gold)}
    .mini-empty{text-align:center;padding:24px;color:var(--muted);font-size:.85rem}
    /* Light */
    body.light{--bg:#f8f4ff;--surface:#ffffff;--surface2:#f0ece8;--text:#1a0a00;--muted:#78716c;--border:rgba(245,158,11,0.2)}
    body.light nav{background:rgba(248,244,255,.92) !important}
    body.light .sidebar{background:rgba(248,244,255,.95)}
    body.light .bg-blobs .blob{opacity:.04}
    @media(max-width:1200px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:20px 16px}.dash-cols{grid-template-columns:1fr}}
    @media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<nav>
  <a class="logo" href="admin_dashboard.html">intern<span>Link</span></a>
  <div class="nav-right">
    <span class="admin-badge">Admin</span>
    <button class="theme-toggle" onclick="toggleTheme()"><div class="theme-knob" id="themeKnob">🌙</div></button>
    <div class="nav-avatar" id="navAvatar">A</div>
  </div>
</nav>

<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Admin Panel</div>
    <a class="nav-link active" href="admin_dashboard.html"><span class="icon">📊</span>Dashboard</a>
    <a class="nav-link" href="admin_users.html"><span class="icon">👥</span>Users</a>
    <a class="nav-link" href="admin_internships.html"><span class="icon">💼</span>Internships</a>
    <a class="nav-link" href="admin_applications.html"><span class="icon">📋</span>Applications</a>
    <a class="nav-link" href="admin_companies.html"><span class="icon">🏢</span>Verify Companies <span class="nav-badge-red" id="pendingBadge">0</span></a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Account</div>
    <a class="nav-link" href='../php/logout.php'><span class="icon">🚪</span>Log Out</a>
  </div>
</aside>

<main class="main">
  <!-- Banner -->
  <div class="banner anim">
    <div class="banner-text">
      <h2>Admin Dashboard 🛡️</h2>
      <p>Platform overview — <span id="todayDate"></span></p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid anim" style="animation-delay:.05s">
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val" id="stUsers">—</div><div class="stat-lbl">Total Users</div></div>
    <div class="stat-card"><div class="stat-icon">🎓</div><div class="stat-val" id="stStudents" style="-webkit-text-fill-color:var(--accent);background:none">—</div><div class="stat-lbl">Students</div></div>
    <div class="stat-card"><div class="stat-icon">🏢</div><div class="stat-val" id="stCompanies" style="-webkit-text-fill-color:var(--gold);background:none">—</div><div class="stat-lbl">Companies</div></div>
    <div class="stat-card"><div class="stat-icon">💼</div><div class="stat-val" id="stInternships" style="-webkit-text-fill-color:var(--accent2);background:none">—</div><div class="stat-lbl">Internships</div></div>
    <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-val" id="stApps" style="-webkit-text-fill-color:var(--accent3);background:none">—</div><div class="stat-lbl">Applications</div></div>
  </div>

  <!-- Tables -->
  <div class="dash-cols">
    <div class="card anim" style="animation-delay:.1s">
      <div class="card-hdr"><h3>👤 Recent Registrations</h3><a href="admin_users.html">All users →</a></div>
      <div id="recentUsers"><div class="skel" style="height:200px"></div></div>
    </div>
    <div class="card anim" style="animation-delay:.12s">
      <div class="card-hdr"><h3>📋 Recent Applications</h3><a href="admin_applications.html">All →</a></div>
      <div id="recentApps"><div class="skel" style="height:200px"></div></div>
    </div>
  </div>
</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    applyTheme();
    document.getElementById('todayDate').textContent = new Date().toLocaleDateString();
    loadDashboard();
  });

  function loadDashboard() {
    fetch('../php/get_stats.php')
      .then(r => r.json())
      .then(d => {
        if (!d.success) { window.location.href = '../../html/login.html'; return; }
        const c = d.counts;
        document.getElementById('stUsers').textContent      = c.total_users      ?? '—';
        document.getElementById('stStudents').textContent   = c.total_students   ?? '—';
        document.getElementById('stCompanies').textContent  = c.total_companies  ?? '—';
        document.getElementById('stInternships').textContent= c.active_internships ?? '—';
        document.getElementById('stApps').textContent       = c.total_applications ?? '—';
        document.getElementById('pendingBadge').textContent = c.pending_companies ?? 0;
        renderRecentUsers(d.recent_users || []);
        renderRecentApps(d.recent_apps || []);
      })
      .catch(() => { window.location.href = '../../html/login.html'; });
  }

  function renderRecentUsers(users) {
    if (!users.length) { document.getElementById('recentUsers').innerHTML = '<div class="mini-empty">No users yet.</div>'; return; }
    document.getElementById('recentUsers').innerHTML = `
      <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead><tbody>
      ${users.map(u => `<tr>
        <td>${esc(u.first_name)} ${esc(u.last_name)}</td>
        <td style="color:var(--muted)">${esc(u.email)}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td style="color:var(--muted)">${new Date(u.created_at).toLocaleDateString()}</td>
      </tr>`).join('')}
      </tbody></table>`;
  }

  function renderRecentApps(apps) {
    if (!apps.length) { document.getElementById('recentApps').innerHTML = '<div class="mini-empty">No applications yet.</div>'; return; }
    const SM = {pending:'sb-pending',viewed:'sb-viewed',accepted:'sb-accepted',rejected:'sb-rejected'};
    document.getElementById('recentApps').innerHTML = `
      <table><thead><tr><th>Student</th><th>Internship</th><th>Status</th></tr></thead><tbody>
      ${apps.map(a => `<tr>
        <td>${esc(a.student_name)}</td>
        <td style="color:var(--muted)">${esc(a.internship_title)}</td>
        <td><span class="status-badge ${SM[a.status]||'sb-pending'}">${a.status}</span></td>
      </tr>`).join('')}
      </tbody></table>`;
  }

  function applyTheme() {
    if (localStorage.getItem('il-theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('themeKnob').textContent = '☀️';
    }
  }
  function toggleTheme() {
    const l = document.body.classList.toggle('light');
    document.getElementById('themeKnob').textContent = l ? '☀️' : '🌙';
    localStorage.setItem('il-theme', l ? 'light' : 'dark');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
