<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users — internLink Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2236;--accent:#4f8ef7;--accent2:#a78bfa;--accent3:#34d399;--text:#f0f4ff;--muted:#8899bb;--border:rgba(79,142,247,0.18);--danger:#f87171;--warn:#fbbf24;--gold:#f59e0b;--nav-h:68px;--sidebar-w:240px}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.08;animation:drift 12s ease-in-out infinite alternate}
    .blob-1{width:600px;height:600px;background:#f59e0b;top:-200px;left:-100px}
    .blob-2{width:500px;height:500px;background:#ef4444;bottom:-150px;right:-100px;animation-delay:4s}
    @keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.05)}}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(10,15,30,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(245,158,11,.15)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.03em;text-decoration:none;color:var(--text)}
    .logo span{color:var(--gold)}
    .nav-right{display:flex;align-items:center;gap:14px}
    .admin-badge{background:linear-gradient(135deg,var(--gold),#ef4444);color:#fff;font-size:.7rem;font-weight:800;padding:3px 10px;border-radius:100px;letter-spacing:.05em;text-transform:uppercase}
    .nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#ef4444);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:#fff}
    .theme-toggle{width:44px;height:24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;position:relative;transition:all .3s;padding:0}
    .theme-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--gold);transition:transform .3s;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1}
    body.light .theme-knob{transform:translateX(20px)}
    .sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--sidebar-w);background:rgba(10,15,30,.9);backdrop-filter:blur(20px);border-right:1px solid rgba(245,158,11,.12);padding:20px 12px;overflow-y:auto;z-index:100}
    .sidebar-section{margin-bottom:28px}
    .sidebar-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 10px;margin-bottom:6px}
    .nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:.875rem;font-weight:500;transition:all .18s}
    .nav-link:hover{background:var(--surface2);color:var(--text)}
    .nav-link.active{background:rgba(245,158,11,.15);color:var(--gold);font-weight:600}
    .nav-link .icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
    .nav-badge-red{margin-left:auto;background:#ef4444;color:#fff;font-size:.65rem;font-weight:700;border-radius:100px;padding:2px 7px}
    .main{margin-top:var(--nav-h);margin-left:var(--sidebar-w);padding:32px 36px;position:relative;z-index:1}
    .page-hdr{margin-bottom:24px}
    .page-hdr h1{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
    .page-hdr p{color:var(--muted);font-size:.9rem}
    /* Toolbar */
    .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:9px 14px;flex:1;min-width:200px;transition:border-color .2s}
    .search-box:focus-within{border-color:var(--gold)}
    .search-box input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.875rem;color:var(--text);flex:1}
    .search-box input::placeholder{color:var(--muted)}
    .filter-pills{display:flex;gap:6px}
    .fpill{padding:7px 16px;border-radius:100px;font-size:.82rem;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
    .fpill.active{background:var(--gold);border-color:var(--gold);color:#000}
    .fpill:hover:not(.active){border-color:rgba(245,158,11,.4);color:var(--text)}
    /* Table card */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    th{color:var(--muted);font-weight:600;text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;background:var(--surface2)}
    td{padding:13px 16px;border-bottom:1px solid rgba(79,142,247,.06);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(245,158,11,.03)}
    .role-badge{display:inline-flex;padding:2px 9px;border-radius:100px;font-size:.7rem;font-weight:700}
    .role-student{background:rgba(79,142,247,.15);color:var(--accent)}
    .role-company{background:rgba(245,158,11,.15);color:var(--gold)}
    .role-admin{background:rgba(239,68,68,.15);color:var(--danger)}
    .banned-row td{opacity:.5}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
    .btn-danger-sm{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.25)}
    .btn-danger-sm:hover{background:rgba(248,113,113,.22)}
    .btn-warn-sm{background:rgba(251,191,36,.12);color:var(--warn);border:1px solid rgba(251,191,36,.25)}
    .btn-warn-sm:hover{background:rgba(251,191,36,.22)}
    .btn-ok-sm{background:rgba(52,211,153,.12);color:var(--accent3);border:1px solid rgba(52,211,153,.25)}
    .btn-ok-sm:hover{background:rgba(52,211,153,.22)}
    /* Pagination */
    .pagination{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:20px}
    .page-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .page-btn:hover{border-color:var(--gold);color:var(--gold)}
    .page-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
    .page-btn:disabled{opacity:.35;cursor:not-allowed}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:400px;padding:28px;animation:modalIn .22s ease}
    @keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
    .modal h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:8px}
    .modal p{color:var(--muted);font-size:.875rem;margin-bottom:22px;line-height:1.6}
    .modal-btns{display:flex;justify-content:flex-end;gap:10px}
    .btn-full{padding:9px 20px;font-size:.875rem}
    .empty-state{text-align:center;padding:48px;color:var(--muted)}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel{background:linear-gradient(90deg,var(--surface2) 25%,rgba(245,158,11,.05) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
    body.light{--bg:#f8f4ff;--surface:#ffffff;--surface2:#f0ece8;--text:#1a0a00;--muted:#78716c;--border:rgba(245,158,11,0.2)}
    body.light nav{background:rgba(248,244,255,.92) !important}
    body.light .sidebar{background:rgba(248,244,255,.95)}
    @media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:20px 16px}}
  </style>
</head>
<body>
<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<nav>
  <a class="logo" href="admin_dashboard.html">intern<span>Link</span></a>
  <div class="nav-right">
    <span class="admin-badge">Admin</span>
    <button class="theme-toggle" onclick="toggleTheme()"><div class="theme-knob" id="themeKnob">🌙</div></button>
    <div class="nav-avatar">A</div>
  </div>
</nav>

<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Admin Panel</div>
    <a class="nav-link" href="admin_dashboard.html"><span class="icon">📊</span>Dashboard</a>
    <a class="nav-link active" href="admin_users.html"><span class="icon">👥</span>Users</a>
    <a class="nav-link" href="admin_internships.html"><span class="icon">💼</span>Internships</a>
    <a class="nav-link" href="admin_applications.html"><span class="icon">📋</span>Applications</a>
    <a class="nav-link" href="admin_companies.html"><span class="icon">🏢</span>Verify Companies <span class="nav-badge-red" id="pendingBadge"></span></a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Account</div>
    <a class="nav-link" href='../php/logout.php'><span class="icon">🚪</span>Log Out</a>
  </div>
</aside>

<main class="main">
  <div class="page-hdr">
    <h1>Manage Users</h1>
    <p>View, ban, or delete student and company accounts</p>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name or email…" oninput="debounceSearch()"/>
    </div>
    <div class="filter-pills">
      <button class="fpill active" onclick="setRole('all',this)">All</button>
      <button class="fpill" onclick="setRole('student',this)"> Students</button>
      <button class="fpill" onclick="setRole('company',this)"> Companies</button>
    </div>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Details</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody id="usersBody">
        <tr><td colspan="6"><div class="skel" style="height:40px;margin:8px 0"></div></td></tr>
        <tr><td colspan="6"><div class="skel" style="height:40px;margin:8px 0"></div></td></tr>
        <tr><td colspan="6"><div class="skel" style="height:40px;margin:8px 0"></div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- Confirm modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="modalTitle">Confirm Action</h3>
    <p id="modalMsg">Are you sure?</p>
    <div class="modal-btns">
      <button class="btn btn-full btn-warn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-full btn-danger-sm" id="modalConfirmBtn" onclick="doAction()">Confirm</button>
    </div>
  </div>
</div>

<script>
  let currentRole = 'all', currentPage = 1, searchTimer = null;
  let pendingAction = null, pendingId = null;

  document.addEventListener('DOMContentLoaded', () => { applyTheme(); load(); });

  function load() {
    const q = document.getElementById('searchInput').value.trim();
    fetch(`../php/get_users.php?role=${currentRole}&q=${encodeURIComponent(q)}&page=${currentPage}`)
      .then(r => r.json())
      .then(d => {
        if (!d.success) { window.location.href = '/internlink/html/login.html'; return; }
        renderTable(d.users);
        renderPagination(d.page, d.pages);
      })
      .catch(() => { window.location.href = '/internlink/html/login.html'; });
  }

  function renderTable(users) {
    const tbody = document.getElementById('usersBody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No users found.</div></td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => {
      const banned = u.email.startsWith('BANNED_');
      const detail = u.role === 'student'
        ? `${esc(u.university||'—')} · ${esc(u.s_country||'—')}`
        : `${esc(u.company_name||u.first_name)} · ${esc(u.sector||'—')}`;
      const banBtn = banned
        ? `<button class="btn btn-ok-sm" onclick="confirm_action('unban',${u.id},'Unban user?','This will restore their login access.')">Unban</button>`
        : `<button class="btn btn-warn-sm" onclick="confirm_action('ban',${u.id},'Ban user?','They will no longer be able to log in.')">Ban</button>`;
      return `<tr class="${banned?'banned-row':''}">
        <td><strong>${esc(u.first_name)} ${esc(u.last_name)}</strong></td>
        <td style="color:var(--muted);font-size:.8rem">${esc(u.email)}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td style="color:var(--muted);font-size:.78rem">${detail}</td>
        <td style="color:var(--muted);font-size:.78rem">${new Date(u.created_at).toLocaleDateString()}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap">
          ${u.role !== 'admin' ? banBtn : ''}
          ${u.role !== 'admin' ? `<button class="btn btn-danger-sm" onclick="confirm_action('delete',${u.id},'Delete user?','This permanently deletes all their data.')">Delete</button>` : '<span style="color:var(--muted);font-size:.75rem">—</span>'}
        </td>
      </tr>`;
    }).join('');
  }

  function renderPagination(page, pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let h = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= pages; i++)
      h += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    h += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
    el.innerHTML = h;
  }

  function goPage(n) { currentPage = n; load(); window.scrollTo({top:0,behavior:'smooth'}); }
  function setRole(r, btn) {
    currentRole = r; currentPage = 1;
    document.querySelectorAll('.fpill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    load();
  }
  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; load(); }, 350);
  }

  function confirm_action(action, id, title, msg) {
    pendingAction = action; pendingId = id;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent   = msg;
    document.getElementById('confirmModal').classList.add('open');
  }
  function closeModal() { document.getElementById('confirmModal').classList.remove('open'); }
  function doAction() {
    const btn = document.getElementById('modalConfirmBtn');
    btn.textContent = 'Working…'; btn.disabled = true;
    fetch('../php/manage_user.php', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action: pendingAction, user_id: pendingId})
    })
    .then(r => r.json())
    .then(d => {
      closeModal();
      if (d.success) load();
      else alert(d.message);
    })
    .finally(() => { btn.textContent = 'Confirm'; btn.disabled = false; });
  }
  document.getElementById('confirmModal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

  function applyTheme() {
    if (localStorage.getItem('il-theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('themeKnob').textContent = '☀️';
    }
  }
  function toggleTheme() {
    const l = document.body.classList.toggle('light');
    document.getElementById('themeKnob').textContent = l ? '☀️' : '🌙';
    localStorage.setItem('il-theme', l ? 'light' : 'dark');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
