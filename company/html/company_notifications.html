<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — internLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2236;--accent:#4f8ef7;--accent2:#a78bfa;--accent3:#34d399;--accent4:#fb923c;--text:#f0f4ff;--muted:#8899bb;--border:rgba(79,142,247,0.18);--danger:#f87171;--warning:#facc15;--sidebar-w:260px;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;}
    .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:50;overflow-y:auto;}
    .sidebar-header{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.03em;}
    .logo span{color:var(--accent);}
    .company-badge{display:flex;align-items:center;gap:10px;margin-top:16px;padding:10px 12px;background:rgba(79,142,247,0.08);border-radius:10px;border:1px solid var(--border);}
    .company-avatar-sm{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;}
    .company-name-sm{font-size:0.85rem;font-weight:600;}
    .company-role-sm{font-size:0.72rem;color:var(--accent3);}
    .nav-section{padding:16px 12px 8px;}
    .nav-label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:0 12px;margin-bottom:6px;font-weight:600;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--muted);text-decoration:none;font-size:0.875rem;font-weight:500;transition:all 0.2s;}
    .nav-item:hover{background:var(--surface2);color:var(--text);}
    .nav-item.active{background:rgba(79,142,247,0.12);color:var(--accent);}
    .nav-icon{font-size:1rem;width:20px;text-align:center;flex-shrink:0;}
    .nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:100px;}
    .nav-badge.warn{background:var(--accent4);}
    .sidebar-footer{margin-top:auto;padding:16px 12px;border-top:1px solid var(--border);}
    .main{margin-left:var(--sidebar-w);flex:1;}
    .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(10,15,30,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    .page-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;}
    .topbar-right{display:flex;align-items:center;gap:12px;}
    .theme-toggle{width:44px;height:24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;position:relative;padding:0;}
    .theme-toggle-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--accent);transition:transform 0.3s;display:flex;align-items:center;justify-content:center;font-size:10px;}
    body.light .theme-toggle-knob{transform:translateX(20px);}
    .content{padding:36px 40px;max-width:800px;}
    .notif-list{display:flex;flex-direction:column;gap:12px;}
    .notif-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;gap:14px;align-items:flex-start;transition:all 0.2s;}
    .notif-card:hover{border-color:rgba(79,142,247,0.35);}
    .notif-card.unread{border-left:3px solid var(--accent);}
    .notif-icon{font-size:1.5rem;flex-shrink:0;margin-top:2px;}
    .notif-body{flex:1;}
    .notif-title{font-weight:600;font-size:0.9rem;margin-bottom:4px;}
    .notif-msg{font-size:0.83rem;color:var(--muted);line-height:1.5;}
    .notif-time{font-size:0.75rem;color:var(--muted);margin-top:6px;}
    .notif-action{display:inline-block;margin-top:8px;font-size:0.8rem;color:var(--accent);text-decoration:none;font-weight:500;}
    .notif-action:hover{text-decoration:underline;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
    .empty-icon{font-size:3rem;margin-bottom:16px;}
    .mark-all{font-size:0.82rem;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;}
    .mark-all:hover{text-decoration:underline;}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel{background:linear-gradient(90deg,var(--surface2) 25%,rgba(79,142,247,.05) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;height:80px;margin-bottom:12px;}
    body.light{--bg:#f4f7ff;--surface:#fff;--surface2:#e8edf8;--text:#0f172a;--muted:#64748b;--border:rgba(59,125,232,0.2);}
    body.light .topbar{background:rgba(244,247,255,0.9);}
    body.light .sidebar{background:var(--surface);}
    @media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;}}
  </style>
</head>
<body>
<script>
  fetch("../../phpsecure/check_session.php", { credentials: "include" })
    .then(r => r.json())
    .then(data => {
      if (!data.loggedIn || data.role !== "company") {
        window.location.href = "/internlink/html/login.html";
      }
    })
    .catch(() => { window.location.href = "/internlink/html/login.html"; });
</script>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">intern<span>Link</span></div>
    <div class="company-badge">
      <div class="company-avatar-sm" id="sidebarAvatar">TC</div>
      <div>
        <div class="company-name-sm" id="sidebarName">Loading…</div>
        <div class="company-role-sm">Company Account</div>
      </div>
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Main</div>
    <a class="nav-item" href="company_dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
    <a class="nav-item" href="company_offers.html"><span class="nav-icon">📋</span> Internship Offers <span class="nav-badge" id="offersCount"></span></a>
    <a class="nav-item" href="company_applications.html"><span class="nav-icon">👥</span> Applications <span class="nav-badge warn" id="appsCount"></span></a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Account</div>
    <a class="nav-item" href="company_profile.html"><span class="nav-icon">🏢</span> Company Profile</a>
    <a class="nav-item active" href="company_notifications.html"><span class="nav-icon">🔔</span> Notifications <span class="nav-badge warn" id="notifCount" style="display:none"></span></a>
  </div>
  <div class="sidebar-footer">
    <a class="nav-item" href="../../phpsecure/logout.php" style="color:var(--danger)"><span class="nav-icon">🚪</span> Log Out</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="page-title">Notifications</div>
    <div class="topbar-right">
      <button class="theme-toggle" onclick="toggleTheme()"><div class="theme-toggle-knob" id="themeKnob">🌙</div></button>
    </div>
  </div>
  <div class="content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;">Recent Activity</h2>
      <button class="mark-all" onclick="markAllRead()">Mark all as read</button>
    </div>
    <div id="notifList">
      <div class="skel"></div>
      <div class="skel"></div>
      <div class="skel"></div>
    </div>
  </div>
</div>

<script>
  function loadNotifications() {
    fetch('../php/get_company_notifications.php', { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        if (!data.success) { window.location.href = '/internlink/html/login.html'; return; }
        renderNotifications(data.notifications);
      })
      .catch(() => {
        document.getElementById('notifList').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load notifications.</p></div>';
      });
  }

  function renderNotifications(notifs) {
    const el = document.getElementById('notifList');
    if (!notifs.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔔</div><p>No notifications yet.</p><p style="font-size:.85rem;margin-top:8px;">You\'ll be notified when students apply to your offers.</p></div>';
      return;
    }
    el.innerHTML = notifs.map(n => `
      <div class="notif-card ${n.is_read ? '' : 'unread'}">
        <div class="notif-icon">${n.icon}</div>
        <div class="notif-body">
          <div class="notif-title">${esc(n.title)}</div>
          <div class="notif-msg">${esc(n.message)}</div>
          <div class="notif-time">${relTime(n.time)}</div>
          ${n.link ? `<a href="${n.link}" class="notif-action">View application →</a>` : ''}
        </div>
      </div>`).join('');
  }

  function markAllRead() {
    fetch('../php/get_company_notifications.php?mark_read=1', { credentials: 'include' }).then(() => {
      document.querySelectorAll('.notif-card.unread').forEach(c => c.classList.remove('unread'));
    });
  }

  function relTime(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Load sidebar ──────────────────────────────────────────────────────────
  (function loadSidebar() {
    fetch('../php/get_company_data.php', { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        if (!data.success) return;
        const displayName = data.profile.company_name || data.profile.email || 'My Company';
        const sn = document.getElementById('sidebarName');
        const sa = document.getElementById('sidebarAvatar');
        if (sn) sn.textContent = displayName;
        if (sa) {
          if (data.profile.avatar_path) {
            sa.innerHTML = '<img src="'+data.profile.avatar_path+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px"/>';
          } else { sa.textContent = data.profile.initials || displayName.charAt(0).toUpperCase(); }
        }
        const oc = document.getElementById('offersCount');
        const ac = document.getElementById('appsCount');
        const nc = document.getElementById('notifCount');
        if (oc) oc.textContent = data.stats.active_offers;
        if (ac) ac.textContent = data.stats.pending_apps;
        if (nc && data.stats.pending_apps > 0) { nc.textContent = data.stats.pending_apps; nc.style.display = ''; }
      }).catch(()=>{});
  })();

  loadNotifications();

  (function(){
    if(localStorage.getItem('il-theme')==='light'){document.body.classList.add('light');document.getElementById('themeKnob').textContent='☀️';}
  })();
  function toggleTheme(){const l=document.body.classList.toggle('light');document.getElementById('themeKnob').textContent=l?'☀️':'🌙';localStorage.setItem('il-theme',l?'light':'dark');}
</script>
</body>
</html>
