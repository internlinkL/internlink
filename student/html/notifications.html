<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — internLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0f1e;--surface:#111827;--surface2:#1a2236;--accent:#4f8ef7;--accent2:#a78bfa;--accent3:#34d399;--text:#f0f4ff;--muted:#8899bb;--border:rgba(79,142,247,0.18);--danger:#f87171;--warn:#fbbf24;--nav-h:68px;--sidebar-w:230px}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.10;animation:drift 12s ease-in-out infinite alternate}
    .blob-1{width:600px;height:600px;background:#4f8ef7;top:-200px;left:-100px}
    .blob-2{width:500px;height:500px;background:#a78bfa;bottom:-150px;right:-100px;animation-delay:4s}
    @keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(30px,20px) scale(1.05)}}

    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(10,15,30,.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-.03em;text-decoration:none;color:var(--text)}
    .logo span{color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:14px;position:relative}
    .nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:#fff;flex-shrink:0}
    .theme-toggle{width:44px;height:24px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;position:relative;transition:all .3s;padding:0}
    .theme-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--accent);transition:transform .3s;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1}
    body.light .theme-knob{transform:translateX(20px)}

    /* Notification bell */
    .notif-btn{position:relative;width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;flex-shrink:0}
    .notif-btn:hover{background:var(--surface);border-color:var(--accent)}
    .notif-badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;background:var(--danger);color:#fff;font-size:.6rem;font-weight:800;border-radius:100px;display:none;align-items:center;justify-content:center;padding:0 4px;font-family:'Syne',sans-serif}

    .sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--sidebar-w);background:rgba(10,15,30,.8);backdrop-filter:blur(20px);border-right:1px solid var(--border);padding:20px 12px;overflow-y:auto;z-index:100}
    .sidebar-section{margin-bottom:28px}
    .sidebar-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 10px;margin-bottom:6px}
    .nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:.875rem;font-weight:500;transition:all .18s}
    .nav-link:hover{background:var(--surface2);color:var(--text)}
    .nav-link.active{background:rgba(79,142,247,.15);color:var(--accent);font-weight:600}
    .nav-link .icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
    .nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;border-radius:100px;padding:2px 7px}

    .main{margin-top:var(--nav-h);margin-left:var(--sidebar-w);padding:32px 36px;position:relative;z-index:1;max-width:800px}

    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
    .page-header p{color:var(--muted);font-size:.9rem}

    .notif-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
    .notif-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
    .notif-card-header h3{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800}
    .mark-read-btn{font-size:.78rem;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}
    .mark-read-btn:hover{text-decoration:underline}

    .notif-item{padding:16px 20px;border-bottom:1px solid var(--border);transition:background .15s}
    .notif-item:last-child{border-bottom:none}
    .notif-item.unread{background:rgba(79,142,247,.04)}
    .notif-item-inner{display:flex;align-items:flex-start;gap:12px}
    .notif-icon-wrap{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
    .notif-body{flex:1;min-width:0}
    .notif-title{font-size:.875rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px}
    .notif-unread-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;flex-shrink:0}
    .notif-msg{font-size:.82rem;color:var(--muted);line-height:1.5}
    .notif-time{font-size:.74rem;color:var(--muted);margin-top:5px;opacity:.7}

    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state .ei{font-size:3rem;margin-bottom:12px}
    .empty-state p{font-size:.9rem}

    .filter-tabs{display:flex;gap:8px;margin-bottom:20px}
    .filter-tab{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s}
    .filter-tab.active{border-color:var(--accent);background:rgba(79,142,247,.1);color:var(--text)}

    /* Light mode */
    body.light{--bg:#f4f7ff;--surface:#ffffff;--surface2:#e8edf8;--accent:#3b7de8;--accent2:#7c3aed;--accent3:#059669;--text:#0f172a;--muted:#64748b;--border:rgba(59,125,232,.2);--danger:#dc2626;--warn:#d97706}
    body.light nav{background:rgba(244,247,255,.9)}
    body.light .sidebar{background:rgba(244,247,255,.9)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    .notif-card{animation:fadeUp .3s ease both}
  </style>
</head>
<body>
<script>
  fetch("/internlink/phpsecure/check_session.php", { credentials: "include" })
    .then(r => r.json())
    .then(data => {
      if (!data.loggedIn || data.role !== "student") {
        window.location.href = "/internlink/html/login.html";
      }
    });
</script>
<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<nav>
  <a class="logo" href="student_dashboard.html">intern<span>Link</span></a>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()"><div class="theme-knob" id="themeKnob">🌙</div></button>
    <!-- Bell -->
    <button class="notif-btn" id="notifBtn" onclick="toggleNotifDropdown()" title="Notifications">
      🔔
      <span class="notif-badge" id="notifBadge">0</span>
    </button>
    <div class="nav-avatar" id="navAvatar">S</div>
  </div>
</nav>

<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Menu</div>
    <a class="nav-link" href="student_dashboard.html"><span class="icon">🏠</span>Dashboard</a>
    <a class="nav-link" href="student_profile.html"><span class="icon">👤</span>My Profile</a>
    <a class="nav-link" href="internships_dash.html"><span class="icon">🔍</span>Browse Internships</a>
    <a class="nav-link" href="applications.html"><span class="icon">📋</span>My Applications</a>
    <a class="nav-link active" href="notifications.html"><span class="icon">🔔</span>Notifications <span class="nav-badge" id="sidebarNotifBadge" style="display:none">0</span></a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Account</div>
    <a class="nav-link" href="../php/logout.php"><span class="icon">🚪</span>Log Out</a>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <h1>🔔 Notifications</h1>
    <p>Stay up to date with your applications and new matches.</p>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterNotifs('all', this)">All</button>
    <button class="filter-tab" onclick="filterNotifs('success', this)">✅ Accepted</button>
    <button class="filter-tab" onclick="filterNotifs('danger', this)">❌ Rejected</button>
    <button class="filter-tab" onclick="filterNotifs('info', this)">🎯 New Matches</button>
  </div>

  <div class="notif-card">
    <div class="notif-card-header">
      <h3>Recent Notifications</h3>
      <button class="mark-read-btn" onclick="markAllRead()">Mark all as read</button>
    </div>
    <div id="notifPageList">
      <div class="empty-state">
        <div class="ei">⏳</div>
        <p>Loading notifications…</p>
      </div>
    </div>
  </div>
</main>

<script>
  let allNotifs   = [];
  let seenIds     = new Set();
  let currentFilter = 'all';

  function getSeenIds() {
    try { return new Set(JSON.parse(sessionStorage.getItem('notif_seen') || '[]')); }
    catch { return new Set(); }
  }
  function markAllSeen(ids) {
    sessionStorage.setItem('notif_seen', JSON.stringify([...ids]));
  }

  function loadNotifications() {
    fetch('../php/get_notifications.php', { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        if (!data.success) { renderEmpty(); return; }
        allNotifs = data.notifications || [];
        seenIds   = getSeenIds();
        renderPage(allNotifs, seenIds);

        // Update badge
        const unread = allNotifs.filter(n => !seenIds.has(n.id)).length;
        const badge  = document.getElementById('notifBadge');
        const sideBadge = document.getElementById('sidebarNotifBadge');
        if (badge) { badge.textContent = unread > 9 ? '9+' : unread; badge.style.display = unread > 0 ? 'flex' : 'none'; }
        if (sideBadge) { sideBadge.textContent = unread; sideBadge.style.display = unread > 0 ? 'inline-block' : 'none'; }
      })
      .catch(() => renderEmpty());
  }

  function renderPage(notifs, seen) {
    const list = document.getElementById('notifPageList');
    const filtered = currentFilter === 'all' ? notifs : notifs.filter(n => n.type === currentFilter);

    if (!filtered.length) { renderEmpty(); return; }

    const colors = {
      success: { bg: 'rgba(52,211,153,.12)',  border: 'rgba(52,211,153,.3)',  text: '#34d399' },
      danger:  { bg: 'rgba(248,113,113,.12)', border: 'rgba(248,113,113,.3)', text: '#f87171' },
      info:    { bg: 'rgba(79,142,247,.12)',  border: 'rgba(79,142,247,.3)',  text: '#4f8ef7' },
    };

    list.innerHTML = filtered.map(n => {
      const isUnread = !seen.has(n.id);
      const c = colors[n.type] || colors.info;
      return `
        <div class="notif-item ${isUnread ? 'unread' : ''}">
          <div class="notif-item-inner">
            <div class="notif-icon-wrap" style="background:${c.bg};border:1px solid ${c.border}">
              ${n.icon}
            </div>
            <div class="notif-body">
              <div class="notif-title" style="color:${c.text}">
                ${esc(n.title)}
                ${isUnread ? '<span class="notif-unread-dot"></span>' : ''}
              </div>
              <div class="notif-msg">${esc(n.message)}</div>
              <div class="notif-time">${formatTime(n.time)}</div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function renderEmpty() {
    document.getElementById('notifPageList').innerHTML = `
      <div class="empty-state">
        <div class="ei">🔔</div>
        <p>No notifications yet. Apply to internships to get started!</p>
      </div>`;
  }

  function markAllRead() {
    const ids = new Set(allNotifs.map(n => n.id));
    markAllSeen(ids);
    seenIds = ids;
    renderPage(allNotifs, seenIds);
    const badge = document.getElementById('notifBadge');
    const sideBadge = document.getElementById('sidebarNotifBadge');
    if (badge) badge.style.display = 'none';
    if (sideBadge) sideBadge.style.display = 'none';
  }

  function filterNotifs(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPage(allNotifs, seenIds);
  }

  function formatTime(timeStr) {
    if (!timeStr) return '';
    const diff = Math.floor((Date.now() - new Date(timeStr).getTime()) / 1000);
    if (diff < 60)    return 'Just now';
    if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function toggleNotifDropdown() {} // placeholder — no dropdown on this page

  function applyTheme() {
    if (localStorage.getItem('il-theme') === 'light') {
      document.body.classList.add('light');
      document.getElementById('themeKnob').textContent = '☀️';
    }
  }
  function toggleTheme() {
    const l = document.body.classList.toggle('light');
    document.getElementById('themeKnob').textContent = l ? '☀️' : '🌙';
    localStorage.setItem('il-theme', l ? 'light' : 'dark');
  }

  // Load name for avatar
  fetch('../php/get_profile.php', { credentials: 'include' })
    .then(r => r.json())
    .then(d => {
      if (d.success && d.profile) {
        document.getElementById('navAvatar').textContent = (d.profile.first_name || 'S')[0].toUpperCase();
      }
    }).catch(() => {});

  applyTheme();
  loadNotifications();
  setInterval(loadNotifications, 60000);
</script>
<script src="../translate-widget.js"></script>
</body>
</html>
